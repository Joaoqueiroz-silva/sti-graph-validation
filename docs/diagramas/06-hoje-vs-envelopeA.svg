<svg viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,Segoe UI,Arial" role="img">
<title>Como os agentes montam o grafo hoje (produção) versus a partir do Envelope A</title>
<desc>Em produção, do tema o pipeline inventa domínio, problemas, interface e grafo. No experimento, a interface é fixa e os agentes recebem só o Envelope A e autoram apenas o grafo. Os dois terminam no mesmo GraphForge.</desc>
<defs>
<marker id="h1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
<style>
.t{font-size:11.5px;font-weight:600;fill:#0f172a}.s{font-size:9.5px;fill:#475569}
.hd{font-size:12.5px;font-weight:600;fill:#334155}
.gray rect{fill:#f1f5f9;stroke:#94a3b8}.blue rect{fill:#dbeafe;stroke:#3b82f6}
.amber rect{fill:#fef3c7;stroke:#d97706}.green rect{fill:#dcfce7;stroke:#22c55e}.purple rect{fill:#ede9fe;stroke:#8b5cf6}
rect{stroke-width:1.2}.arr{stroke:#94a3b8;stroke-width:1.5;fill:none}.div{stroke:#e2e8f0;stroke-width:1.2;stroke-dasharray:4 4}
</style>
</defs>
<text class="hd" x="175" y="22" text-anchor="middle">HOJE (produção)</text>
<text class="hd" x="505" y="22" text-anchor="middle">EXPERIMENTO (Envelope A)</text>
<line class="div" x1="340" y1="34" x2="340" y2="392"/>
<g class="gray"><rect x="40" y="36" width="270" height="40" rx="8"/><text class="t" x="175" y="56" text-anchor="middle" dominant-baseline="central">professor: tema "frações"</text></g>
<g class="amber"><rect x="370" y="36" width="270" height="40" rx="8"/><text class="t" x="505" y="56" text-anchor="middle" dominant-baseline="central">interface FIXA (vinda do .brd)</text></g>
<path class="arr" d="M175 76 L175 96" marker-end="url(#h1)"/>
<path class="arr" d="M505 76 L505 96" marker-end="url(#h1)"/>
<g class="blue"><rect x="40" y="98" width="270" height="48" rx="8"/><text class="t" x="175" y="116" text-anchor="middle" dominant-baseline="central">Agents 1+2 inventam</text><text class="s" x="175" y="133" text-anchor="middle" dominant-baseline="central">domínio, KCs e problemas</text></g>
<g class="amber"><rect x="370" y="98" width="270" height="48" rx="8"/><text class="t" x="505" y="116" text-anchor="middle" dominant-baseline="central">Envelope A (já pronto)</text><text class="s" x="505" y="133" text-anchor="middle" dominant-baseline="central">problema, componentes, resposta, KCs</text></g>
<path class="arr" d="M175 146 L175 166" marker-end="url(#h1)"/>
<path class="arr" d="M505 146 L505 166" marker-end="url(#h1)"/>
<g class="blue"><rect x="40" y="168" width="270" height="48" rx="8"/><text class="t" x="175" y="186" text-anchor="middle" dominant-baseline="central">3 alunos simulados</text><text class="s" x="175" y="203" text-anchor="middle" dominant-baseline="central">sobre problemas inventados</text></g>
<g class="blue"><rect x="370" y="168" width="270" height="48" rx="8"/><text class="t" x="505" y="186" text-anchor="middle" dominant-baseline="central">3 alunos simulados</text><text class="s" x="505" y="203" text-anchor="middle" dominant-baseline="central">PRESOS aos componentes dados</text></g>
<path class="arr" d="M175 216 L175 244" marker-end="url(#h1)"/>
<path class="arr" d="M505 216 L505 244" marker-end="url(#h1)"/>
<g class="purple"><rect x="95" y="246" width="160" height="40" rx="8"/><text class="t" x="175" y="266" text-anchor="middle" dominant-baseline="central">GraphForge</text></g>
<g class="purple"><rect x="425" y="246" width="160" height="40" rx="8"/><text class="t" x="505" y="266" text-anchor="middle" dominant-baseline="central">GraphForge</text></g>
<path class="arr" d="M175 286 L175 306" marker-end="url(#h1)"/>
<path class="arr" d="M505 286 L505 306" marker-end="url(#h1)"/>
<g class="green"><rect x="40" y="308" width="270" height="48" rx="8"/><text class="t" x="175" y="326" text-anchor="middle" dominant-baseline="central">grafo + interface</text><text class="s" x="175" y="343" text-anchor="middle" dominant-baseline="central">tudo inventado pelos agentes</text></g>
<g class="green"><rect x="370" y="308" width="270" height="48" rx="8"/><text class="t" x="505" y="326" text-anchor="middle" dominant-baseline="central">só o grafo</text><text class="s" x="505" y="343" text-anchor="middle" dominant-baseline="central">a interface foi dada (cego)</text></g>
<g class="gray"><rect x="120" y="402" width="440" height="48" rx="8"/></g>
<text class="t" x="340" y="420" text-anchor="middle" dominant-baseline="central">é o MESMO GraphForge nos dois</text>
<text class="s" x="340" y="438" text-anchor="middle" dominant-baseline="central">muda só O QUE os agentes recebem ANTES de chamá-lo</text>
</svg>
