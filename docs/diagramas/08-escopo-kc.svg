<svg viewBox="0 0 680 430" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,Segoe UI,Arial" role="img">
<title>A pergunta do orientador: KC descoberto e a saída dupla</title>
<desc>Hoje, se um agente usa um KC fora da lista inicial, o graphForge cai num fallback silencioso e o KC novo é descartado; a saída traz só os KCs originais. O orientador propõe emitir também um grafo de conhecimento atualizado. A validação do comportamento já está feita; a do conhecimento é futura.</desc>
<defs>
<marker id="p1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
<marker id="p2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#16a34a"/></marker>
<style>
.t{font-size:11px;font-weight:600;fill:#0f172a}.s{font-size:9.5px;fill:#475569}
.gray rect{fill:#f1f5f9;stroke:#94a3b8}.blue rect{fill:#dbeafe;stroke:#3b82f6}.green rect{fill:#dcfce7;stroke:#22c55e}
.amber rect{fill:#fef3c7;stroke:#d97706}.red rect{fill:#fee2e2;stroke:#ef4444}
rect{stroke-width:1.2}.arr{stroke:#94a3b8;stroke-width:1.5;fill:none}
.prop rect{fill:#dcfce7;stroke:#16a34a;stroke-dasharray:5 4}.parr{stroke:#16a34a;stroke-width:1.5;fill:none;stroke-dasharray:5 4}
.badge{font-size:9.5px;font-weight:600;fill:#15803d}
</style>
</defs>
<g class="gray"><rect x="40" y="28" width="260" height="42" rx="8"/><text class="t" x="170" y="49" text-anchor="middle" dominant-baseline="central">grafo de conhecimento inicial (KCs)</text></g>
<path class="arr" d="M170 70 L170 96" marker-end="url(#p1)"/>
<g class="blue"><rect x="40" y="98" width="260" height="42" rx="8"/><text class="t" x="170" y="119" text-anchor="middle" dominant-baseline="central">agentes-aluno resolvem o problema</text></g>
<path class="arr" d="M170 140 L170 174" marker-end="url(#p1)"/>
<g class="green"><rect x="40" y="176" width="260" height="52" rx="8"/><text class="t" x="170" y="194" text-anchor="middle" dominant-baseline="central">grafo de COMPORTAMENTO</text><text class="s" x="170" y="212" text-anchor="middle" dominant-baseline="central">passos, erros, dicas — a saída</text></g>
<text class="badge" x="170" y="248" text-anchor="middle">✓ é o que VALIDAMOS hoje (vs CTAT)</text>
<path class="arr" d="M300 119 L360 119" marker-end="url(#p1)"/>
<g class="amber"><rect x="362" y="98" width="296" height="42" rx="8"/><text class="t" x="510" y="113" text-anchor="middle" dominant-baseline="central">e se o agente usar um KC novo</text><text class="s" x="510" y="129" text-anchor="middle" dominant-baseline="central">(uma micro-habilidade fora da lista inicial)?</text></g>
<path class="arr" d="M510 140 L510 168" marker-end="url(#p1)"/>
<g class="red"><rect x="362" y="170" width="296" height="64" rx="8"/><text class="t" x="510" y="188" text-anchor="middle" dominant-baseline="central">HOJE: fallback silencioso</text><text class="s" x="510" y="206" text-anchor="middle" dominant-baseline="central">graphforge.js:91 → o KC novo é DESCARTADO</text><text class="s" x="510" y="222" text-anchor="middle" dominant-baseline="central">a saída traz só os KCs ORIGINAIS</text></g>
<path class="parr" d="M510 234 L510 260" marker-end="url(#p2)"/>
<text class="badge" x="668" y="252" text-anchor="end">o orientador propõe ↓</text>
<g class="prop"><rect x="362" y="262" width="296" height="66" rx="8"/><text class="t" x="510" y="281" text-anchor="middle" dominant-baseline="central">PROPOSTA: virar um nó novo</text><text class="s" x="510" y="299" text-anchor="middle" dominant-baseline="central">→ emitir uma 2ª saída:</text><text class="s" x="510" y="315" text-anchor="middle" dominant-baseline="central">grafo de conhecimento ATUALIZADO</text></g>
<g class="gray"><rect x="40" y="350" width="618" height="62" rx="8"/></g>
<text class="t" x="349" y="370" text-anchor="middle" dominant-baseline="central">o escopo dos artigos</text>
<text class="s" x="349" y="389" text-anchor="middle" dominant-baseline="central">1º artigo: validar o grafo de COMPORTAMENTO (já feito — robô vs CTAT, "igual porém maior")</text>
<text class="s" x="349" y="405" text-anchor="middle" dominant-baseline="central">grafo de conhecimento atualizado + sua validação = trabalho futuro (2º artigo)</text>
</svg>
