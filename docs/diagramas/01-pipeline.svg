<svg viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui,Segoe UI,Arial">
<title>Visão geral do experimento de validação CTAT x EducaOFF</title>
<desc>O .brd é dividido em Envelope A (interface, dado aos agentes que autoram o grafo do robô) e Envelope B (grafo do especialista); ambos viram esquema neutro e são comparados por quatro métricas.</desc>
<defs>
<marker id="a1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
<style>
.t{font-size:13.5px;font-weight:600;fill:#0f172a}.s{font-size:10.5px;fill:#475569}
.arr{stroke:#94a3b8;stroke-width:1.6;fill:none}.lg{font-size:10.5px;fill:#64748b}
.gray rect{fill:#f1f5f9;stroke:#94a3b8}.blue rect{fill:#dbeafe;stroke:#3b82f6}
.amber rect{fill:#fef3c7;stroke:#d97706}.purple rect{fill:#ede9fe;stroke:#8b5cf6}
rect{stroke-width:1.2}
</style>
</defs>
<g class="gray"><rect x="290" y="16" width="140" height="42" rx="8"/><text class="t" x="360" y="37" text-anchor="middle" dominant-baseline="central">expert.brd (CTAT)</text></g>
<path class="arr" d="M360 58 L360 86" marker-end="url(#a1)"/>
<g class="blue"><rect x="220" y="88" width="280" height="48" rx="8"/><text class="t" x="360" y="105" text-anchor="middle" dominant-baseline="central">parse-ctat-brd.js</text><text class="s" x="360" y="123" text-anchor="middle" dominant-baseline="central">divide em 2 envelopes disjuntos</text></g>
<path class="arr" d="M360 136 L360 152 L175 152 L175 184" marker-end="url(#a1)"/>
<path class="arr" d="M360 136 L360 152 L520 152 L520 184" marker-end="url(#a1)"/>
<g class="blue"><rect x="55" y="186" width="240" height="56" rx="8"/><text class="t" x="175" y="206" text-anchor="middle" dominant-baseline="central">Envelope A — interface</text><text class="s" x="175" y="225" text-anchor="middle" dominant-baseline="central">enunciado, componentes, resposta, KCs</text></g>
<g class="amber"><rect x="400" y="186" width="240" height="56" rx="8"/><text class="t" x="520" y="206" text-anchor="middle" dominant-baseline="central">Envelope B — especialista</text><text class="s" x="520" y="225" text-anchor="middle" dominant-baseline="central">passos, erros, dicas, arestas</text></g>
<text class="lg" x="175" y="258" text-anchor="middle">o robô só vê este (CEGO)</text>
<text class="lg" x="520" y="258" text-anchor="middle">isolado, só p/ comparar</text>
<path class="arr" d="M175 242 L175 286" marker-end="url(#a1)"/>
<g class="blue"><rect x="55" y="288" width="240" height="56" rx="8"/><text class="t" x="175" y="308" text-anchor="middle" dominant-baseline="central">agentes EducaOFF autoram</text><text class="s" x="175" y="327" text-anchor="middle" dominant-baseline="central">3 alunos simulados → graphForge</text></g>
<path class="arr" d="M175 344 L175 380" marker-end="url(#a1)"/>
<g class="blue"><rect x="75" y="382" width="200" height="44" rx="8"/><text class="t" x="175" y="404" text-anchor="middle" dominant-baseline="central">grafo do robô</text></g>
<path class="arr" d="M520 242 L520 382" marker-end="url(#a1)"/>
<g class="amber"><rect x="420" y="382" width="200" height="44" rx="8"/><text class="t" x="520" y="404" text-anchor="middle" dominant-baseline="central">grafo do especialista</text></g>
<path class="arr" d="M175 426 L175 452 L300 452 L300 470" marker-end="url(#a1)"/>
<path class="arr" d="M520 426 L520 452 L420 452 L420 470" marker-end="url(#a1)"/>
<g class="purple"><rect x="250" y="472" width="220" height="44" rx="8"/><text class="t" x="360" y="494" text-anchor="middle" dominant-baseline="central">esquema neutro (schema.js)</text></g>
<path class="arr" d="M360 516 L360 532" marker-end="url(#a1)"/>
<g class="purple"><rect x="120" y="534" width="480" height="42" rx="8"/><text class="t" x="360" y="549" text-anchor="middle" dominant-baseline="central">validação</text><text class="s" x="360" y="566" text-anchor="middle" dominant-baseline="central">F1 · F1 conceitual · equivalência funcional · juiz cego</text></g>
</svg>
