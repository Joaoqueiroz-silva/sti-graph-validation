<svg viewBox="0 0 680 470" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,Segoe UI,Arial" role="img">
<title>Como o .brd é dividido em Envelope A e Envelope B</title>
<desc>parseBrdToRobotInput extrai a interface (Envelope A, que o robô vê); parseBrdToExpertNeutral extrai o grafo do especialista (Envelope B); uma parede separa os dois. O classificador é o actionType, não o buggyMessage.</desc>
<defs>
<marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
<style>
.t{font-size:13px;font-weight:600;fill:#0f172a}.s{font-size:10.5px;fill:#475569}
.mono{font-size:10.5px;font-family:ui-monospace,Menlo,monospace;fill:#334155}
.arr{stroke:#94a3b8;stroke-width:1.5;fill:none}
.gray rect{fill:#f1f5f9;stroke:#94a3b8}.blue rect{fill:#dbeafe;stroke:#3b82f6}.amber rect{fill:#fef3c7;stroke:#d97706}
rect{stroke-width:1.2}.wall{stroke:#ef4444;stroke-width:1.5;stroke-dasharray:6 5}
</style>
</defs>
<g class="gray"><rect x="250" y="14" width="180" height="42" rx="8"/><text class="t" x="340" y="28" text-anchor="middle" dominant-baseline="central">expert.brd</text><text class="s" x="340" y="44" text-anchor="middle" dominant-baseline="central">XML stateGraph</text></g>
<path class="arr" d="M340 56 L340 70 L150 70 L150 92" marker-end="url(#a2)"/>
<path class="arr" d="M340 56 L340 70 L530 70 L530 92" marker-end="url(#a2)"/>
<g class="blue"><rect x="30" y="94" width="240" height="40" rx="8"/><text class="mono" x="150" y="114" text-anchor="middle" dominant-baseline="central">parseBrdToRobotInput()</text></g>
<g class="amber"><rect x="410" y="94" width="240" height="40" rx="8"/><text class="mono" x="530" y="114" text-anchor="middle" dominant-baseline="central">parseBrdToExpertNeutral()</text></g>
<path class="arr" d="M150 134 L150 158" marker-end="url(#a2)"/>
<path class="arr" d="M530 134 L530 158" marker-end="url(#a2)"/>
<g class="blue"><rect x="30" y="160" width="240" height="176" rx="10"/></g>
<text class="t" x="150" y="178" text-anchor="middle" dominant-baseline="central">Envelope A — o robô VÊ</text>
<text class="s" x="46" y="204" dominant-baseline="central">problem  ← startNodeMessages</text>
<text class="s" x="46" y="230" dominant-baseline="central">components ← Selection distintas</text>
<text class="s" x="46" y="256" dominant-baseline="central">correctAnswer ← Input correto</text>
<text class="s" x="46" y="282" dominant-baseline="central">knowledgeComponents ← ruleName</text>
<text class="s" x="46" y="312" dominant-baseline="central" font-style="italic">sem erros, sem dicas, sem arestas</text>
<g class="amber"><rect x="410" y="160" width="240" height="176" rx="10"/></g>
<text class="t" x="530" y="178" text-anchor="middle" dominant-baseline="central">Envelope B — só comparação</text>
<text class="s" x="426" y="204" dominant-baseline="central">steps ← arestas corretas</text>
<text class="s" x="426" y="230" dominant-baseline="central">misconceptions ← arestas de erro</text>
<text class="s" x="442" y="248" dominant-baseline="central" font-style="italic">wrongAnswer = Input do erro</text>
<text class="s" x="426" y="274" dominant-baseline="central">transitions ← backbone</text>
<text class="s" x="426" y="300" dominant-baseline="central">hints ← hintMessage</text>
<line class="wall" x1="340" y1="92" x2="340" y2="344"/>
<text x="340" y="360" text-anchor="middle" font-size="10.5px" fill="#b91c1c">parede anti-contaminação · findLeaksInRobotInput()</text>
<g class="gray"><rect x="60" y="384" width="560" height="66" rx="8"/></g>
<text class="t" x="340" y="404" text-anchor="middle" dominant-baseline="central">classificador de aresta</text>
<text class="s" x="340" y="426" text-anchor="middle" dominant-baseline="central">actionType = "Ação Correta" → passo   |   "Ação com erro" → misconception</text>
<text class="s" x="340" y="442" text-anchor="middle" dominant-baseline="central" font-style="italic">NÃO a presença de buggyMessage (arestas corretas também o têm)</text>
</svg>
