<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,Segoe UI,Arial" role="img">
<title>As quatro métricas de validação</title>
<desc>Os grafos neutros do robô e do especialista são alinhados pela âncora canônica e comparados por F1 estrutural/conceitual, não-inferioridade, equivalência funcional (kappa) e juiz cego de validade pedagógica.</desc>
<defs>
<marker id="a4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
<style>
.t{font-size:12.5px;font-weight:600;fill:#0f172a}.s{font-size:10px;fill:#475569}
.r{font-size:11px;font-weight:600;fill:#6d28d9}
.arr{stroke:#94a3b8;stroke-width:1.5;fill:none}
.blue rect{fill:#dbeafe;stroke:#3b82f6}.amber rect{fill:#fef3c7;stroke:#d97706}
.gray rect{fill:#f1f5f9;stroke:#94a3b8}.purple rect{fill:#ede9fe;stroke:#8b5cf6}
rect{stroke-width:1.2}
</style>
</defs>
<g class="blue"><rect x="70" y="14" width="230" height="44" rx="8"/><text class="t" x="185" y="36" text-anchor="middle" dominant-baseline="central">grafo do robô (neutro)</text></g>
<g class="amber"><rect x="380" y="14" width="230" height="44" rx="8"/><text class="t" x="495" y="36" text-anchor="middle" dominant-baseline="central">grafo do especialista (neutro)</text></g>
<path class="arr" d="M185 58 L185 74 L340 74 L340 90" marker-end="url(#a4)"/>
<path class="arr" d="M495 58 L495 74 L340 74 L340 90" marker-end="url(#a4)"/>
<g class="gray"><rect x="220" y="92" width="240" height="44" rx="8"/><text class="t" x="340" y="108" text-anchor="middle" dominant-baseline="central">alinhamento pela âncora</text><text class="s" x="340" y="125" text-anchor="middle" dominant-baseline="central">canonAnswer (0/4 ≡ 0, 2/8 ≡ 1/4)</text></g>
<path class="arr" d="M340 136 L340 162 L95 162 L95 182" marker-end="url(#a4)"/>
<path class="arr" d="M340 136 L340 162 L255 162 L255 182" marker-end="url(#a4)"/>
<path class="arr" d="M340 136 L340 162 L425 162 L425 182" marker-end="url(#a4)"/>
<path class="arr" d="M340 136 L340 162 L585 162 L585 182" marker-end="url(#a4)"/>
<g class="purple"><rect x="20" y="184" width="150" height="70" rx="8"/><text class="t" x="95" y="204" text-anchor="middle" dominant-baseline="central">F1 de nós</text><text class="s" x="95" y="223" text-anchor="middle" dominant-baseline="central">estrutural + conceitual</text><text class="s" x="95" y="240" text-anchor="middle" dominant-baseline="central">(passos ∪ erros)</text></g>
<g class="purple"><rect x="180" y="184" width="150" height="70" rx="8"/><text class="t" x="255" y="204" text-anchor="middle" dominant-baseline="central">não-inferioridade</text><text class="s" x="255" y="223" text-anchor="middle" dominant-baseline="central">bootstrap de cluster</text><text class="s" x="255" y="240" text-anchor="middle" dominant-baseline="central">vs banda humana</text></g>
<g class="purple"><rect x="340" y="184" width="150" height="70" rx="8"/><text class="t" x="415" y="204" text-anchor="middle" dominant-baseline="central">equiv. funcional</text><text class="s" x="415" y="223" text-anchor="middle" dominant-baseline="central">veredito por resposta</text><text class="s" x="415" y="240" text-anchor="middle" dominant-baseline="central">concordância + κ</text></g>
<g class="purple"><rect x="500" y="184" width="150" height="70" rx="8"/><text class="t" x="575" y="204" text-anchor="middle" dominant-baseline="central">juiz cego</text><text class="s" x="575" y="223" text-anchor="middle" dominant-baseline="central">validade pedagógica</text><text class="s" x="575" y="240" text-anchor="middle" dominant-baseline="central">GLM + calibração</text></g>
<text class="r" x="95" y="276" text-anchor="middle">0,46 / 0,51</text>
<text class="r" x="255" y="276" text-anchor="middle">inconclusivo*</text>
<text class="r" x="415" y="276" text-anchor="middle">κ ≈ 0,03</text>
<text class="r" x="575" y="276" text-anchor="middle">95% válidos</text>
<g class="gray"><rect x="60" y="300" width="560" height="56" rx="8"/></g>
<text class="t" x="340" y="320" text-anchor="middle" dominant-baseline="central">leitura conjunta</text>
<text class="s" x="340" y="340" text-anchor="middle" dominant-baseline="central">grafos diferentes (κ≈0) mas os erros do robô são válidos (95%) → complementar, não pior</text>
<text class="s" x="340" y="370" text-anchor="middle" dominant-baseline="central" font-style="italic">* inconclusivo até entrar 2º especialista (banda humana). Números de 1 corrida estocástica.</text>
</svg>
