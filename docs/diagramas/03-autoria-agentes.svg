<svg viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,Segoe UI,Arial" role="img">
<title>Como os agentes autoram o grafo a partir do Envelope A</title>
<desc>Envelope A alimenta a simulação de 3 alunos (avançado, em-risco, mediano), que produz traces; estes viram config do GraphForge, que monta o grafo; A1 injeta as respostas nos nós; normaliza-se ao esquema neutro.</desc>
<defs>
<marker id="a3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
<style>
.t{font-size:13px;font-weight:600;fill:#0f172a}.s{font-size:10.5px;fill:#475569}
.arr{stroke:#94a3b8;stroke-width:1.6;fill:none}
.blue rect{fill:#dbeafe;stroke:#3b82f6}.green rect{fill:#d1fae5;stroke:#10b981}
.amber rect{fill:#fef3c7;stroke:#d97706}.purple rect{fill:#ede9fe;stroke:#8b5cf6}
rect{stroke-width:1.2}
</style>
</defs>
<g class="blue"><rect x="240" y="14" width="200" height="44" rx="8"/><text class="t" x="340" y="36" text-anchor="middle" dominant-baseline="central">Envelope A (interface)</text></g>
<path class="arr" d="M340 58 L340 80" marker-end="url(#a3)"/>
<g class="blue"><rect x="200" y="82" width="280" height="56" rx="8"/><text class="t" x="340" y="102" text-anchor="middle" dominant-baseline="central">simulateStudents (LLM)</text><text class="s" x="340" y="121" text-anchor="middle" dominant-baseline="central">avançado · em-risco · mediano — só nos componentes</text></g>
<path class="arr" d="M340 138 L340 160" marker-end="url(#a3)"/>
<g class="green"><rect x="200" y="162" width="280" height="56" rx="8"/><text class="t" x="340" y="182" text-anchor="middle" dominant-baseline="central">traces</text><text class="s" x="340" y="201" text-anchor="middle" dominant-baseline="central">correctPath · misconceptions · hints</text></g>
<path class="arr" d="M340 218 L340 240" marker-end="url(#a3)"/>
<g class="blue"><rect x="210" y="242" width="260" height="44" rx="8"/><text class="t" x="340" y="264" text-anchor="middle" dominant-baseline="central">buildGraphForgeConfig</text></g>
<path class="arr" d="M340 286 L340 308" marker-end="url(#a3)"/>
<g class="blue"><rect x="200" y="310" width="280" height="56" rx="8"/><text class="t" x="340" y="330" text-anchor="middle" dominant-baseline="central">graphForge (determinístico)</text><text class="s" x="340" y="349" text-anchor="middle" dominant-baseline="central">nós, arestas, scaffolds, dicas</text></g>
<path class="arr" d="M340 366 L340 388" marker-end="url(#a3)"/>
<g class="amber"><rect x="200" y="390" width="280" height="56" rx="8"/><text class="t" x="340" y="410" text-anchor="middle" dominant-baseline="central">A1 — injeta a resposta no nó</text><text class="s" x="340" y="429" text-anchor="middle" dominant-baseline="central">só na avaliação (graphForge grava value=null)</text></g>
<path class="arr" d="M340 446 L340 468" marker-end="url(#a3)"/>
<g class="purple"><rect x="160" y="470" width="360" height="56" rx="8"/><text class="t" x="340" y="490" text-anchor="middle" dominant-baseline="central">grafo do robô → normalizeEducaoff</text><text class="s" x="340" y="509" text-anchor="middle" dominant-baseline="central">esquema neutro, pronto p/ comparar</text></g>
</svg>
