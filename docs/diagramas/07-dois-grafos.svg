<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,Segoe UI,Arial" role="img">
<title>Grafo de conhecimento versus grafo de comportamento</title>
<desc>O grafo de conhecimento lista as habilidades (KCs) e seus pré-requisitos. O grafo de comportamento lista os passos, erros e dicas do tutor. Cada passo do comportamento usa um KC do conhecimento.</desc>
<defs>
<marker id="g1" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#0ea5e9"/></marker>
<marker id="g2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#94a3b8"/></marker>
<style>
.hd{font-size:12.5px;font-weight:600;fill:#334155}.t{font-size:11px;font-weight:600;fill:#0f172a}
.s{font-size:9.5px;fill:#475569}
.kc rect{fill:#e0f2fe;stroke:#0ea5e9}.step rect{fill:#dbeafe;stroke:#3b82f6}.scaf rect{fill:#fee2e2;stroke:#ef4444}.se rect{fill:#f1f5f9;stroke:#94a3b8}
rect{stroke-width:1.2}.pre{stroke:#0ea5e9;stroke-width:1.5;fill:none}.arr{stroke:#94a3b8;stroke-width:1.5;fill:none}
.div{stroke:#e2e8f0;stroke-width:1.2;stroke-dasharray:4 4}
</style>
</defs>
<text class="hd" x="170" y="22" text-anchor="middle">grafo de CONHECIMENTO</text>
<text class="s" x="170" y="38" text-anchor="middle">o que o aluno precisa SABER</text>
<text class="hd" x="510" y="22" text-anchor="middle">grafo de COMPORTAMENTO</text>
<text class="s" x="510" y="38" text-anchor="middle">o que o TUTOR faz</text>
<line class="div" x1="340" y1="14" x2="340" y2="330"/>
<g class="kc"><rect x="95" y="56" width="150" height="38" rx="8"/><text class="t" x="170" y="75" text-anchor="middle" dominant-baseline="central">IdenDenominator</text></g>
<path class="pre" d="M170 94 L170 122" marker-end="url(#g1)"/>
<g class="kc"><rect x="95" y="124" width="150" height="38" rx="8"/><text class="t" x="170" y="143" text-anchor="middle" dominant-baseline="central">IdenNumerator</text></g>
<path class="pre" d="M170 162 L170 190" marker-end="url(#g1)"/>
<g class="kc"><rect x="95" y="192" width="150" height="38" rx="8"/><text class="t" x="170" y="211" text-anchor="middle" dominant-baseline="central">DivNumLine</text></g>
<text class="s" x="170" y="252" text-anchor="middle">nós = habilidades (KCs)</text>
<text class="s" x="170" y="268" text-anchor="middle">arestas = pré-requisitos</text>
<g class="se"><rect x="455" y="52" width="110" height="32" rx="8"/><text class="t" x="510" y="68" text-anchor="middle" dominant-baseline="central">start</text></g>
<path class="arr" d="M510 84 L510 104" marker-end="url(#g2)"/>
<g class="step"><rect x="430" y="106" width="160" height="40" rx="8"/><text class="t" x="510" y="120" text-anchor="middle" dominant-baseline="central">passo: denom = 4</text><text class="s" x="510" y="136" text-anchor="middle" dominant-baseline="central">usa KC: IdenDenominator</text></g>
<path class="arr" d="M510 146 L510 166" marker-end="url(#g2)"/>
<g class="step"><rect x="430" y="168" width="160" height="40" rx="8"/><text class="t" x="510" y="182" text-anchor="middle" dominant-baseline="central">passo: ponto em 1/4</text><text class="s" x="510" y="198" text-anchor="middle" dominant-baseline="central">usa KC: DivNumLine</text></g>
<path class="arr" d="M590 188 L632 188 L632 120" marker-end="url(#g2)"/>
<g class="scaf"><rect x="430" y="226" width="160" height="36" rx="8"/><text class="s" x="510" y="244" text-anchor="middle" dominant-baseline="central">erro previsto: "3/4" → remediação</text></g>
<path class="arr" d="M510 208 L510 226" marker-end="url(#g2)"/>
<text class="s" x="510" y="284" text-anchor="middle">nós = passos, erros, dicas · arestas = certo/erro</text>
<g class="se"><rect x="60" y="312" width="560" height="52" rx="8"/></g>
<text class="t" x="340" y="330" text-anchor="middle" dominant-baseline="central">a ponte entre os dois</text>
<text class="s" x="340" y="349" text-anchor="middle" dominant-baseline="central">cada PASSO do comportamento aponta para um KC do conhecimento (campo knowledgeComponents)</text>
</svg>
