<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Tutor de Soma</title>
    <style>
      .cell {
        width: 40px;
      }
    </style>
  </head>
  <body>
    <div id="problem-statement">Resolva a soma com reagrupamento: <b>27 + 15 = ?</b></div>
    <form>
      <label for="ans_units">Coluna das unidades (com o vai-um)</label>
      <input id="ans_units" type="text" class="cell" />

      <label for="ans_final">Resultado final</label>
      <input id="ans_final" type="text" class="cell" />

      <input type="hidden" id="problemId" value="soma-27-15" />
      <button id="btnDone" type="submit">Conferir</button>
    </form>
  </body>
</html>
